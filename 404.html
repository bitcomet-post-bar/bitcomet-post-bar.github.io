<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>

<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta http-equiv="Content-Language" content="zh-cn">
<title>找不到页面 | 比特彗星历史备份</title>
<meta http-equiv="refresh" content="5;URL=./index.htm">
<style type="text/css">
html, body {
    height: 100%;
}
body {
    margin: 0;
    padding: 0;
    width: 100%;
    background-color: #F6F6F6;
    font-weight: bold;
    color: #808080;
    display: table; /* 现代浏览器 */
    font-family: sans-serif;
    /* IE6 特有：因为不支持 table 布局，body 需要作为定位基准 */
    *position: relative; 
}
.container {
    text-align: center;
    display: table-cell; /* 现代浏览器 */
    vertical-align: middle; /* 现代浏览器 */
    
    /* IE6 专属修复：模拟垂直居中 */
    *position: absolute;
    *top: 50%;
    *left: 0;
    *width: 100%;
}
.content {
    text-align: center;
    display: inline-block;
    *display: inline;
    *zoom: 1;
    
    /* IE6 专属修复：配合 container 的 top 50% 实现完全居中 */
    *position: relative;
    *top: -50%; 
}
.title {
    font-size: 72px;
    margin-bottom: 40px;
}
</style></head>

<body>

<div class="container">
	<div class="content">
		<div class="title">
			404 找不到页面</div>
		<p>正在重定向到 <a href="/index.htm">主页</a> </p>
	</div>
</div>
<!-- p 元素可以占满一整行
宽度可随父系元素变化 span 元素则不行
-->

</body>

</html>
